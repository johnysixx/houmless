#####################################################################
# Creality Ender 7 + BTT SKR 3 EZ + Sonic Pad - Kompletní Konfigurace
#####################################################################

# Import základních maker a nastavení rozhraní Mainsail

[mcu]
# Pokud spojení po restartu selže, ověřte si USB ID v průvodci Sonic Padu.
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_SKR3EZ-if00

[printer]
kinematics: corexy                # Změněno z Cartesian na CoreXY pro Ender 7!
max_velocity: 350                 # Ender 7 zvládá vysoké rychlosti
max_accel: 4000
max_z_velocity: 15
max_z_accel: 100

#####################################################################
# KINEMATIKA COREXY: Motor A (Zapojen v pozici STEPPER X na SKR 3 EZ)
#####################################################################

[stepper_x]
step_pin: PD4
dir_pin: PD3                      # Pokud se tisková hlava hýbe nesprávně, přidejte/odeberte vykřičník (!)
enable_pin: !PD6
microsteps: 32                    # Pro tišší a hladší chod na linearách
rotation_distance: 32             # Specifická hodnota pro řemenice Enderu 7!
endstop_pin: ^PC1                 # Fyzický X koncový spínač (X-MIN)
position_endstop: 0
position_max: 260                 # Tisková plocha X pro Ender 7
homing_speed: 60

[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.900                # Trochu vyšší proud, motory u Ender 7 jsou větší
stealthchop_threshold: 0          # Pro CoreXY a vysoké rychlosti doporučeno vypnout (0)

#####################################################################
# KINEMATIKA COREXY: Motor B (Zapojen v pozici STEPPER Y na SKR 3 EZ)
#####################################################################

[stepper_y]
step_pin: PA15
dir_pin: !PA8                     # Pokud se tisková hlava hýbe nesprávně, přidejte/odeberte vykřičník (!)
enable_pin: !PD1
microsteps: 32
rotation_distance: 32             # Specifická hodnota pro řemenice Enderu 7!
endstop_pin: ^PC3                 # Fyzický Y koncový spínač (Y-MIN)
position_endstop: 260             # Ender 7 obvykle homuje dozadu (Y-MAX)
position_max: 260                 # Tisková plocha Y pro Ender 7
homing_speed: 60

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.900
stealthchop_threshold: 0

#####################################################################
# Osa Z (Zapojeno v pozici STEPPER Z na SKR 3 EZ)
#####################################################################

[stepper_z]
step_pin: PE2
dir_pin: PE3                      # Pokud jede podložka opačně, přidejte vykřičník: !PE3
enable_pin: !PE0
microsteps: 16
rotation_distance: 8              # Trapézový šroub Ender 7 (TR8x8)
endstop_pin: ^PC0                 # Fyzický Z koncový spínač (Pokud máte BL-Touch/CR-Touch, upravíme)
position_endstop: 0.0
position_max: 300                 # Výška tisku Z pro Ender 7
homing_speed: 10

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.800
stealthchop_threshold: 999999

#####################################################################
# Extrudér (Zapojeno v pozici E0 na SKR 3 EZ)
#####################################################################

[extruder]
step_pin: PD15
dir_pin: !PD14                    # Pokud motor točí obráceně (tahá filament ven), odeberte vykřičník: PD14
enable_pin: !PC7
microsteps: 16
rotation_distance: 33.500         # Výchozí hodnota. Pokud máte originální Ender 7 extruder, bude nutné zkalibrovat.
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB3                   # Výstup HE0
sensor_type: EPCOS 100K B57560G104F # Originální Creality termistor
sensor_pin: PA2                   # Vstup TH0
min_temp: 0
max_temp: 275                     # Ender 7 hotend zvládá až 260–270 °C
control: pid                      # Výchozí PID, doporučuji zkalibrovat
pid_kp: 22.2
pid_ki: 1.08
pid_kd: 114.0

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.650
stealthchop_threshold: 0

#####################################################################
# Vyhřívaná Podložka (Heater Bed)
#####################################################################

[heater_bed]
heater_pin: PD7                   # Výstup HB na SKR 3 EZ
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1                   # Vstup TB na SKR 3 EZ
min_temp: 0
max_temp: 110
control: pid
pid_kp: 54.0
pid_ki: 0.77
pid_kd: 948.0

#####################################################################
# Ventilátory (Fans)
#####################################################################

# Ventilátor ofuku výtisku (Dva boční ventilátory na tiskové hlavě)
[fan]
pin: PB7                          # Zapojeno do portu FAN0

# Automatický ventilátor hotendu (Chlazení chladiče, sepne nad 50 °C)
[heater_fan hotend_fan]
pin: PB6                          # Zapojeno do portu FAN1
heater: extruder
heater_temp: 50.0

# Chlazení elektroniky / základní desky (Zapne se, jakmile pracují motory)
[controller_fan elektronika_fan]
pin: PB5                          # Zapojeno do portu FAN2
stepper: stepper_x, stepper_y, stepper_z

#####################################################################
# Specifické přepsání cest pro Creality Sonic Pad
#####################################################################

[virtual_sdcard]
path: /mnt/UDISK/.crealityprint/upload
