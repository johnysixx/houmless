#   !Ender-7
#   printer_size: 250x250x300
#   version: 3.4
#   This file contains pin mappings for the stock 2021 Creality Ender 7.
#   To use this config, during "make menuconfig" select the
#   STM32F103 with a "28KiB bootloader" and serial (on USART1 PA10/PA9)
#   communication.

#   Flash this firmware by copying "out/klipper.bin" to a SD card and
#   turning on the printer with the card inserted. The firmware
#   filename must end in ".bin" and must not match the last filename
#   that was flashed.

# See docs/Config_Reference.md for a description of parameters.
                                                                                         
               
                    #####################################################################
                                   #HOUMLESS 1.0.0.0printer HOUMLESS.cfg
                    #####################################################################

[mcu]
# Pokud spojení po restartu selže, ověřte si USB ID v průvodci Sonic Padu.
serial: /dev/serial/by-id/usb_serial_1


[printer]
kinematics: corexy                # Nastaveno CoreXY pro kinematiku Enderu 7
max_velocity: 500                 
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100


#####################################################################
# Osa X - Sensorless Homing (Slot STEPPER X)
#####################################################################

[stepper_x]
step_pin: PD4
dir_pin: !PD3                      # Pokud jede hlava obráceně, přidejte vykřičník (!)
enable_pin: !PD6
microsteps: 32                    
rotation_distance: 64            
endstop_pin: tmc2209_stepper_x:virtual_endstop # Použije virtuální stop ovladače
position_endstop: 0
position_max: 260                 
homing_speed: 40                  # Pro sensorless držte rychlost mezi 40-50
homing_retract_dist: 0            # U sensorless homingu musí být striktně 0!

[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.900                
diag_pin: ^PC1                    # Hardware pin propojený DIAG jumperem
driver_SGTHRS: 80                # Citlivost nárazu (0-255). 100 je dobrý začátek.
stealthchop_threshold: 0          

#####################################################################
# Osa Y - Sensorless Homing (Slot STEPPER Y)
#####################################################################

[stepper_y]
step_pin: PA15
dir_pin: !PA8                     # Pokud jede hlava obráceně, pridejte vykřičník
enable_pin: !PD1
microsteps: 32
rotation_distance: 64       
endstop_pin: tmc2209_stepper_y:virtual_endstop # Použije virtuální stop ovladače
position_endstop: 260             # Ender 7 homuje dozadu na Y-MAX
position_max: 260                 
homing_speed: 40                  
homing_retract_dist: 0            # U sensorless homingu musí být striktně 0

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.900
diag_pin: ^PC3                    # Hardware pin propojený DIAG jumperem
driver_SGTHRS: 20                # Citlivost nárazu (0-255). 100 je dobrý začátek.
stealthchop_threshold: 0

#####################################################################
# Osa Z (Jednodrátový fyzický spínač - slot STEPPER Z)
#####################################################################

[stepper_z]
step_pin: PE2
             
dir_pin: !PE3                      
enable_pin: !PE0
microsteps: 16
rotation_distance: 8              
# ZMĚNA: Použije se virtuální endstop ovladače Z
endstop_pin: tmc2209_stepper_z:virtual_endstop 
# POZOR: U sensorless homingu musí být position_endstop ZAKOMENTOVANÝ (#) nebo smazaný!
position_endstop: 0.1
position_max: 250                 
homing_speed: 10
homing_retract_dist: 0            # DŮLEŽITÉ: U sensorless homingu musí být striktně 0!

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.800
diag_pin: ^PC0                   # Hardware pin spojený se Z-DIAG jumperem (na SKR 3 EZ je to PE1)
driver_SGTHRS: 110                # Citlivost nárazu (0-255). 100 je bezpečný start, bude nutné doladit.
stealthchop_threshold: 999999

#####################################################################
# Extrudér (Zapojeno v pozici E0 na SKR 3 EZ)
#####################################################################

[extruder]
step_pin: PD15
dir_pin: !PD14                    
enable_pin: !PC7
microsteps: 16
rotation_distance: 33.500         
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB3                   
sensor_type: EPCOS 100K B57560G104F 
sensor_pin: PA2                   
min_temp: 0
max_temp: 275                     
control: pid                      
pid_kp: 22.2
pid_ki: 1.08
pid_kd: 114.0

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.650
stealthchop_threshold: 0

#####################################################################
# Vyhřívaná Podložka (Heater Bed)
#####################################################################

[heater_bed]
heater_pin: PD7                   
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1                   
min_temp: 0
max_temp: 110
control: pid
pid_kp: 54.0
pid_ki: 0.77
pid_kd: 948.0

#####################################################################
# Ventilátory (Fans)
#####################################################################

[fan]
pin: PB7                          

[heater_fan hotend_fan]
pin: PB6                          
heater: extruder
heater_temp: 50.0

[controller_fan elektronika_fan]
pin: PB5                          
stepper: stepper_x, stepper_y, stepper_z



###fluidd set
[virtual_sdcard]
path: ~/gcode_files

[display_status]

[pause_resume]




[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_maximum.x|float - 25.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 25.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
       {% set z_safe = 2.0 %}
  {% else %}
       {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY) %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  RESUME_BASE {get_params}

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 Z4.5 F300
    G90
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %}
    G28 X Y
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    G1 Y{y_park} F2000
    M84
  CANCEL_PRINT_BASE




#####################################################################
# Ventilátory (Fans)
#####################################################################




#####################################################################
# Specifické přepsání cest pro Creality Sonic Pad
#####################################################################

[idle_timeout]
timeout: 172800

[virtual_sdcard]
path: /mnt/UDISK/.crealityprint/upload

[pause_resume]

[display_status]

[exclude_object]

[include timelapse.cfg]

[gcode_arcs]
#resolution: 1.0


[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT_OVERRIDE
description: Zruseni aktualniho tisku
gcode:
  TURN_OFF_HEATERS
  M106 S0
  M104 S0
  M140 S0
  CLEAR_PAUSE
  SDCARD_RESET_FILE

