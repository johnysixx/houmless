#####################################################################
          #HOUMLESS 1.0.0.0printer HOUMLESS.cfg
#####################################################################

[mcu]
# Pokud spojení po restartu selže, ověřte si USB ID v průvodci Sonic Padu.
serial: /dev/serial/by-id/usb_serial_1


##aletrnativni mcu
##[mcu]
# Pokud spojení po restartu selže, ověřte si USB ID v průvodci Sonic Padu.
##serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_SKR3EZ-if00


[printer]
kinematics: corexy                # Nastaveno CoreXY pro kinematiku Enderu 7
max_velocity: 500                 
max_accel: 3000
max_z_velocity: 10
max_z_accel: 100

#####################################################################
# Osa X - Sensorless Homing (Slot STEPPER X)
#####################################################################

[stepper_x]
step_pin: PD4
dir_pin: PD3                      # Pokud jede hlava obráceně, přidejte vykřičník (!)
enable_pin: !PD6
microsteps: 32                    
rotation_distance: 32             
endstop_pin: tmc2209_stepper_x:virtual_endstop # Použije virtuální stop ovladače
position_endstop: 0
position_max: 250                 
homing_speed: 40                  # Pro sensorless držte rychlost mezi 40-50
homing_retract_dist: 0            # U sensorless homingu musí být striktně 0!

[tmc2209 stepper_x]
uart_pin: PD5
run_current: 0.900                
diag_pin: ^PC1                    # Hardware pin propojený DIAG jumperem
driver_SGTHRS: 150                # Citlivost nárazu (0-255). 100 je dobrý začátek.
stealthchop_threshold: 0          

#####################################################################
# Osa Y - Sensorless Homing (Slot STEPPER Y)
#####################################################################

[stepper_y]
step_pin: PA15
dir_pin: !PA8                     # Pokud jede hlava obráceně, odeberte vykřičník
enable_pin: !PD1
microsteps: 32
rotation_distance: 32             
endstop_pin: tmc2209_stepper_y:virtual_endstop # Použije virtuální stop ovladače
position_endstop: 230             # Ender 7 homuje dozadu na Y-MAX
position_max: 250                 
homing_speed: 40                  
homing_retract_dist: 0            # U sensorless homingu musí být striktně 0!

[tmc2209 stepper_y]
uart_pin: PD0
run_current: 0.900
diag_pin: ^PC3                    # Hardware pin propojený DIAG jumperem
driver_SGTHRS: 150                # Citlivost nárazu (0-255). 100 je dobrý začátek.
stealthchop_threshold: 0

#####################################################################
# Osa Z - Sensorless Homing (Příprava do budoucna)
#####################################################################

[stepper_z]
step_pin: PE2
dir_pin: !PE3                      
enable_pin: !PE0
microsteps: 16
rotation_distance: 8              
# ZMĚNA: Použije se virtuální endstop ovladače Z
endstop_pin: tmc2209_stepper_z:virtual_endstop 
# POZOR: U sensorless homingu musí být position_endstop ZAKOMENTOVANÝ (#) nebo smazaný!
# position_endstop: 0.1
position_max: 260                 
homing_speed: 10
homing_retract_dist: 0            # DŮLEŽITÉ: U sensorless homingu musí být striktně 0!

[tmc2209 stepper_z]
uart_pin: PE1
run_current: 0.800
diag_pin: ^PE1                     # Hardware pin spojený se Z-DIAG jumperem (na SKR 3 EZ je to PE1)
driver_SGTHRS: 150                # Citlivost nárazu (0-255). 100 je bezpečný start, bude nutné doladit.
stealthchop_threshold: 999999
#####################################################################
# Extrudér (Zapojeno v pozici E0 na SKR 3 EZ)
#####################################################################

[extruder]

pressure_advance = 0.520
max_extrude_only_distance: 1000.0
step_pin: PD15
dir_pin: !PD14                    
enable_pin: !PC7
microsteps: 16
rotation_distance: 33.500         
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB3                   
sensor_type: EPCOS 100K B57560G104F 
sensor_pin: PA2                   
min_temp: 0
max_temp: 275                     
#control: pid                      
#pid_kp: 22.2
#pid_ki: 1.08
#pid_kd: 114.0

[tmc2209 extruder]
uart_pin: PC6
run_current: 0.650
stealthchop_threshold: 0

#####################################################################
# Vyhřívaná Podložka (Heater Bed)
#####################################################################

[heater_bed]
heater_pin: PD7                   
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA1                   
min_temp: 0
max_temp: 110
control: pid
pid_kp: 54.0
pid_ki: 0.77
pid_kd: 948.0

#####################################################################
# Ventilátory (Fans)
#####################################################################

[fan]
pin: PB7                          

[heater_fan hotend_fan]
pin: PB6                          
heater: extruder
heater_temp: 50.0

[controller_fan elektronika_fan]
pin: PB5                          
stepper: stepper_x, stepper_y, stepper_z

#####################################################################
# Specifické přepsání cest pro Creality Sonic Pad
#####################################################################

[idle_timeout]
timeout: 172800

[virtual_sdcard]
path: /mnt/UDISK/.crealityprint/upload

[pause_resume]

[display_status]

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT_OVERRIDE
description: Zruseni aktualniho tisku
gcode:
  TURN_OFF_HEATERS
  M106 S0
  M104 S0
  M140 S0
  CLEAR_PAUSE
  SDCARD_RESET_FILE

